<!DOCTYPE html>
<html lang='ru'>
    <head>
        <meta charset='utf-8'>
        <title>Пробный файл</title>
        <link rel='stylesheet' href='style.css'>
    </head>
    <body>
        <header>
            <h1>Proxy Checker</h1>
        </header>

        <main class='content'>
            <div class='description'>
                <p>This one-page site is made to check free proxies and to show the results</p>
            </div>

            <form class='proxy-form'>
                <div class='proxy'>
                    <label for='proxy'>Enter proxy address</label>
                    <input type='text' id='proxy-input' placeholder='socks5://66.42.59.155:443'>
                    <input type='button' id='submit-button' value='Submit'>
                </div>
            </form>
        </main>

        <footer>
            <p>There will be github link</p>
        </footer>
    </body>
</html>
